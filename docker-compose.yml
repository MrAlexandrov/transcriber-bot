services:
  whisper:
    build:
      context: .
      dockerfile: whisper/Dockerfile
    environment:
      - GRPC_PORT=50053
      - WHISPER_MODEL=small

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - WHISPER_GRPC_HOST=whisper
      - WHISPER_GRPC_PORT=50053
      - WEBHOOK_PORT=8080
    ports:
      - "8080:8080"
    depends_on:
      - whisper
